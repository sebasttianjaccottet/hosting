<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEBA envíos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#0d1b2a,#1b263b);
  color:white;
}

header{
  text-align:center;
  padding:80px 20px;
}

h1{
  font-size:3em;
  color:#fca311;
}

.subtitle{
  margin-top:10px;
  opacity:0.8;
}

.section{
  padding:60px 20px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  width:260px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card h3{
  color:#fca311;
  margin-bottom:10px;
}

.form{
  margin-top:30px;
}

input, textarea{
  width:90%;
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
}

.btn{
  background:#25D366;
  padding:15px 30px;
  border-radius:12px;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

.btn:hover{
  transform:scale(1.05);
}

#error{
  color:red;
  margin-top:10px;
}

footer{
  text-align:center;
  padding:30px;
  opacity:0.6;
}

/* BOTON FLOTANTE */
.whatsapp-float{
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #25D366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 999;
  transition: 0.3s;
}

.whatsapp-float img{
  width:28px;
  height:28px;
}

.whatsapp-float:hover{
  transform: scale(1.1);
}

/* animacion */
.whatsapp-float{
  animation: pulse 2s infinite;
}

@keyframes pulse{
  0%{box-shadow: 0 0 0 0 rgba(37,211,102,0.6);}
  70%{box-shadow: 0 0 0 15px rgba(37,211,102,0);}
  100%{box-shadow: 0 0 0 0 rgba(37,211,102,0);}
}
</style>
</head>

<body>

<header>
  <h1>SEBA envíos</h1>
  <p class="subtitle">Rápido. Seguro. A tiempo.</p>
</header>

<section class="section">
  <h2>🚀 Servicios</h2>

  <div class="cards">
    <div class="card">
      <h3>📦 Envíos</h3>
      <p>Entregas rápidas en la ciudad</p>
    </div>

    <div class="card">
      <h3>🛍️ Mandados</h3>
      <p>Compras y trámites por vos</p>
    </div>

    <div class="card">
      <h3>⚡ Express</h3>
      <p>Servicio prioritario</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>📦 Pedí tu envío en 30 segundos</h2>

  <div class="form">
    <input id="nombre" placeholder="Tu nombre">
    <input id="direccion" placeholder="Dirección de retiro">
    <input id="destino" placeholder="Dirección de entrega">
    <textarea id="detalle" placeholder="¿Qué hay que enviar?"></textarea>

    <button class="btn" onclick="enviarWhatsApp()">
      Enviar pedido 🚀
    </button>

    <p id="error"></p>
  </div>
</section>

<footer>
  © 2026 SEBA envíos
</footer>

<!-- BOTON FLOTANTE -->
<a href="https://wa.me/59895829865" class="whatsapp-float" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>
function enviarWhatsApp(){
  let nombre = document.getElementById("nombre");
  let direccion = document.getElementById("direccion");
  let destino = document.getElementById("destino");
  let detalle = document.getElementById("detalle");
  let error = document.getElementById("error");

  // reset bordes
  nombre.style.border = "none";
  direccion.style.border = "none";
  destino.style.border = "none";
  detalle.style.border = "none";

  if(!nombre.value.trim() || !direccion.value.trim() || !destino.value.trim() || !detalle.value.trim()){
    error.innerText = "⚠️ Completá todos los campos";

    if(!nombre.value.trim()) nombre.style.border = "2px solid red";
    if(!direccion.value.trim()) direccion.style.border = "2px solid red";
    if(!destino.value.trim()) destino.style.border = "2px solid red";
    if(!detalle.value.trim()) detalle.style.border = "2px solid red";

    return;
  }

  error.innerText = "";

  let mensaje = `Hola!, quiero coordinar un envio porfavor.
Nombre: ${nombre.value}
Retiro: ${direccion.value}
Entrega: ${destino.value}
Detalle: ${detalle.value}`;

  let url = "https://wa.me/59895829865?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
</script>

</body>
</html>
