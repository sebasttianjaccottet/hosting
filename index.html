<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>SEBA envíos</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FONTS RETRO -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Montserrat', sans-serif;
}

body{
  background:#f4e1c1;
  color:#2b2b2b;
}

/* HEADER */
header{
  text-align:center;
  padding:80px 20px;
  background:#1b263b;
  color:white;
}

h1{
  font-family:'Bebas Neue', sans-serif;
  font-size:4em;
  color:#fca311;
  letter-spacing:2px;
}

.subtitle{
  margin-top:10px;
  opacity:0.8;
}

/* LOGO */
.logo{
  width: 200px;px;
  margin-top:20px;
  border-radius:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* SECCIONES */
.section{
  padding:60px 20px;
  text-align:center;
}

/* CARDS */
.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:20px;
  margin-top:30px;
}

.card{
  background:#fff8e7;
  border:3px solid #fca311;
  padding:25px;
  border-radius:15px;
  width:260px;
  box-shadow:5px 5px 0px #2b2b2b;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card h3{
  font-family:'Bebas Neue', sans-serif;
  color:#d62828;
  font-size:1.5em;
}

/* FORM */
.form{
  margin-top:30px;
}

input, textarea{
  width:90%;
  padding:12px;
  margin:10px;
  border:2px solid #2b2b2b;
  border-radius:8px;
  background:#fff8e7;
}

.btn{
  background:#d62828;
  padding:15px 30px;
  border-radius:10px;
  color:white;
  border:none;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  box-shadow:3px 3px 0px #2b2b2b;
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}

#error{
  color:red;
  margin-top:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  background:#1b263b;
  color:white;
  margin-top:40px;
}

/* BOTON FLOTANTE */
.whatsapp-float{
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 60px;
  height: 60px;
  background: #25D366;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  z-index: 999;
}

.whatsapp-float img{
  width:28px;
  height:28px;
}
</style>
</head>

<body>

<header>
  <h1>SEBA envíos</h1>
  <p class="subtitle">Rápido. Seguro. A tiempo.</p>

  <!-- TU LOGO -->
  <img src="logo.png" class="logo">
</header>

<section class="section">
  <h2>🚀 Servicios</h2>

  <div class="cards">
    <div class="card">
      <h3>📦 Envíos</h3>
      <p>Entregas rápidas en la ciudad</p>
    </div>

    <div class="card">
      <h3>🛍️ Mandados</h3>
      <p>Compras y trámites por vos</p>
    </div>

    <div class="card">
      <h3>⚡ Express</h3>
      <p>Servicio prioritario</p>
    </div>
  </div>
</section>

<section class="section">
  <h2>📦 Pedí tu envío</h2>

  <div class="form">
    <input id="nombre" placeholder="Tu nombre">
    <input id="direccion" placeholder="Dirección de retiro">
    <input id="destino" placeholder="Dirección de entrega">
    <textarea id="detalle" placeholder="¿Qué hay que enviar?"></textarea>

    <button class="btn" onclick="enviarWhatsApp()">
      Enviar pedido 🚀
    </button>

    <p id="error"></p>
  </div>
</section>

<footer>
  © 2026 SEBA envíos
</footer>

<!-- BOTON FLOTANTE -->
<a href="https://wa.me/59895829865" class="whatsapp-float" target="_blank">
  <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

<script>
function enviarWhatsApp(){
  let nombre = document.getElementById("nombre");
  let direccion = document.getElementById("direccion");
  let destino = document.getElementById("destino");
  let detalle = document.getElementById("detalle");
  let error = document.getElementById("error");

  nombre.style.border="";
  direccion.style.border="";
  destino.style.border="";
  detalle.style.border="";

  if(!nombre.value.trim() || !direccion.value.trim() || !destino.value.trim() || !detalle.value.trim()){
    error.innerText = "⚠️ Completá todos los campos";

    if(!nombre.value.trim()) nombre.style.border="2px solid red";
    if(!direccion.value.trim()) direccion.style.border="2px solid red";
    if(!destino.value.trim()) destino.style.border="2px solid red";
    if(!detalle.value.trim()) detalle.style.border="2px solid red";

    return;
  }

  error.innerText = "";

  let mensaje = `Hola! Quiero coordinar un envio.
Nombre: ${nombre.value}
Retiro: ${direccion.value}
Entrega: ${destino.value}
Detalle: ${detalle.value}`;

  let url = "https://wa.me/59895829865?text=" + encodeURIComponent(mensaje);

  window.open(url, "_blank");
}
</script>

</body>
</html>
